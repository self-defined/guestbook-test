<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>留言墙实验</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans SC", sans-serif;
      color: #2d2926;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 176, 144, 0.35), transparent 28%),
        radial-gradient(circle at 85% 10%, rgba(148, 190, 255, 0.32), transparent 24%),
        linear-gradient(135deg, #fff8ed, #f3f7ff);
      padding: 32px 18px;
    }

    main {
      width: min(760px, 100%);
      margin: 0 auto;
    }

    .card {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(83, 61, 43, 0.14);
      backdrop-filter: blur(16px);
      padding: clamp(22px, 5vw, 38px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(34px, 8vw, 58px);
      letter-spacing: -0.06em;
      line-height: 1;
    }

    .subtitle {
      margin: 0 0 26px;
      color: #766e66;
      line-height: 1.8;
    }

    form {
      display: grid;
      gap: 12px;
      margin-bottom: 24px;
    }

    label {
      font-size: 14px;
      color: #6d645c;
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid rgba(45, 41, 38, 0.14);
      background: rgba(255, 255, 255, 0.72);
      border-radius: 18px;
      padding: 13px 15px;
      font: inherit;
      color: #2d2926;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 110px;
    }

    input:focus,
    textarea:focus {
      border-color: rgba(96, 117, 196, 0.5);
      box-shadow: 0 0 0 4px rgba(96, 117, 196, 0.12);
    }

    button {
      justify-self: start;
      border: 0;
      border-radius: 999px;
      background: #2d2926;
      color: #fffaf2;
      font-weight: 800;
      padding: 13px 20px;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    button:hover { transform: translateY(-2px); }
    button:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .status {
      min-height: 24px;
      color: #766e66;
      font-size: 14px;
      margin-bottom: 18px;
    }

    .messages {
      display: grid;
      gap: 12px;
    }

    .message {
      border: 1px solid rgba(45, 41, 38, 0.1);
      background: rgba(255, 255, 255, 0.55);
      border-radius: 20px;
      padding: 16px;
    }

    .message-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .name {
      font-weight: 800;
    }

    .time {
      color: #8b8178;
      white-space: nowrap;
    }

    .content {
      margin: 0;
      color: #4a433e;
      line-height: 1.7;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .hint {
      margin-top: 24px;
      color: #8b8178;
      font-size: 13px;
      line-height: 1.7;
    }

    code {
      background: rgba(45, 41, 38, 0.08);
      padding: 2px 6px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>留言墙实验</h1>
      <p class="subtitle">
        这是一个最小动态网页实验：提交留言后，它会被存进 Supabase 数据库；别人刷新页面也能看到。
      </p>

      <form id="guestbookForm">
        <div>
          <label for="name">昵称</label>
          <input id="name" name="name" maxlength="20" placeholder="例如：小鱼" required />
        </div>

        <div>
          <label for="message">留言</label>
          <textarea id="message" name="message" maxlength="200" placeholder="写点什么吧，最多 200 字。" required></textarea>
        </div>

        <button id="submitBtn" type="submit">提交留言</button>
      </form>

      <div class="status" id="status">正在读取留言……</div>
      <div class="messages" id="messages"></div>

      <p class="hint">
        设置前请把代码里的 <code>YOUR_SUPABASE_URL</code> 和 <code>YOUR_SUPABASE_ANON_KEY</code> 换成你的 Supabase 项目参数。
      </p>
    </section>
  </main>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://ugkwdftfbfeyvjmppimz.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVna3dkZnRmYmZleXZqbXBwaW16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NDQxMDMsImV4cCI6MjA5NTAyMDEwM30.Cfa67pGxgC1MIhuse0EIM-vA8m9yhkca99e9rGQZvV0";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById("guestbookForm");
    const nameInput = document.getElementById("name");
    const messageInput = document.getElementById("message");
    const submitBtn = document.getElementById("submitBtn");
    const statusEl = document.getElementById("status");
    const messagesEl = document.getElementById("messages");

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatTime(dateString) {
      return new Intl.DateTimeFormat("zh-CN", {
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      }).format(new Date(dateString));
    }

    async function loadMessages() {
      statusEl.textContent = "正在读取留言……";

      const { data, error } = await supabase
        .from("guestbook_messages")
        .select("id, name, message, created_at")
        .order("created_at", { ascending: false })
        .limit(20);

      if (error) {
        statusEl.textContent = "读取失败：" + error.message;
        return;
      }

      if (!data || data.length === 0) {
        statusEl.textContent = "还没有留言。你可以写第一条。";
        messagesEl.innerHTML = "";
        return;
      }

      statusEl.textContent = `已读取最近 ${data.length} 条留言。`;
      messagesEl.innerHTML = data.map(item => `
        <article class="message">
          <div class="message-header">
            <span class="name">${escapeHtml(item.name)}</span>
            <span class="time">${formatTime(item.created_at)}</span>
          </div>
          <p class="content">${escapeHtml(item.message)}</p>
        </article>
      `).join("");
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const name = nameInput.value.trim();
      const message = messageInput.value.trim();

      if (!name || !message) {
        statusEl.textContent = "昵称和留言都要填。";
        return;
      }

      if (name.length > 20 || message.length > 200) {
        statusEl.textContent = "昵称最多 20 字，留言最多 200 字。";
        return;
      }

      submitBtn.disabled = true;
      statusEl.textContent = "正在提交……";

      const { error } = await supabase
        .from("guestbook_messages")
        .insert([{ name, message }]);

      submitBtn.disabled = false;

      if (error) {
        statusEl.textContent = "提交失败：" + error.message;
        return;
      }

      messageInput.value = "";
      statusEl.textContent = "提交成功。";
      await loadMessages();
    });

    loadMessages();
  </script>
</body>
</html>
